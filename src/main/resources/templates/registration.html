<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Регистрация</title>
</head>
<body>

<h2>Регистрация</h2>

<div>
    <form th:action="@{/registration}" method="post" th:object="${user}">
        <div>
            <input type="text" th:field="*{username}" placeholder="Username" required autofocus/>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: red"></span>
            <span th:text="${usernameError}" style="color: red"></span>
        </div>

        <div>
            <input type="password" th:field="*{password}" placeholder="Password" required/>
        </div>

        <div>
            <input type="password" th:field="*{passwordConfirm}" placeholder="Confirm your password" required/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red"></span>
            <span th:text="${passwordError}" style="color: red"></span>
        </div>

        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<a href="/">Главная</a>

</body>
</html>
