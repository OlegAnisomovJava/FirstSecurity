<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Удаление пользователя</title>
    <link rel="stylesheet" type="text/css" th:href="@{/resources/css/style.css}">
</head>
<body>
<div>
    <h2>Вы уверены, что хотите удалить этого пользователя?</h2>

    <p><strong>ID:</strong> <span th:text="${user.id}"></span></p>
    <p><strong>Имя:</strong> <span th:text="${user.firstName}"></span></p>
    <p><strong>Фамилия:</strong> <span th:text="${user.lastName}"></span></p>
    <p><strong>Возраст:</strong> <span th:text="${user.age}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>Роли:</strong> <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span></p>

    <!-- ✅ Кнопка подтверждения удаления -->
    <form th:action="@{/admin/deleteConfirmed}" method="post">
        <input type="hidden" name="userId" th:value="${user.id}">
        <button type="submit" style="background-color: red; color: white;">Подтвердить удаление</button>
    </form>

    <!-- ✅ Кнопка отмены -->
    <a href="/admin">
        <button>Отмена</button>
    </a>
</div>
</body>
</html>
