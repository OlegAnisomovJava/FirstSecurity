<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Редактировать пользователя</title>
</head>
<body>
<h2>Редактировать пользователя</h2>

<form th:action="@{/admin/update}" th:object="${user}" method="post">
    <label>ID:</label>
    <input type="text" th:field="*{id}" readonly>

    <label>Имя:</label>
    <input type="text" th:field="*{firstName}" required>

    <label>Фамилия:</label>
    <input type="text" th:field="*{lastName}" required>

    <label>Возраст:</label>
    <input type="number" th:field="*{age}" required>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required>

    <label>Пароль (оставьте пустым, если не хотите менять):</label>
    <input type="password" name="password">

    <label>Роль:</label>
    <select name="role">
        <option value="ROLE_USER" th:selected="${user.roles[0].name == 'ROLE_USER'}">Пользователь</option>
        <option value="ROLE_ADMIN" th:selected="${user.roles[0].name == 'ROLE_ADMIN'}">Администратор</option>
    </select>

    <button type="submit">Сохранить</button>
</form>

<a href="/admin">Назад</a>
</body>
</html>
