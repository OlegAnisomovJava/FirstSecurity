<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" type="text/css" th:href="@{/resources/css/style.css}">
</head>
<body>
<div>
    <h2>Админ-панель</h2>

    <!-- ✅ Кнопка "Добавить пользователя" -->
    <a th:href="@{/admin/add}">
        <button>Добавить пользователя</button>
    </a>

    <!-- ✅ Кнопка "Перейти на страницу пользователя" -->
    <!-- ✅ Кнопка "Перейти в профиль" -->
    <a th:href="@{/user}">
        <button style="background-color: blue; color: white;">Перейти в профиль</button>
    </a>


    <!-- ✅ Таблица пользователей -->
    <h3>Список пользователей</h3>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Roles</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${allUsers}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.firstName}"></td>
            <td th:text="${user.lastName}"></td>
            <td th:text="${user.age}"></td>
            <td th:text="${user.email}"></td>
            <td>
                <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
            </td>
            <td>
                <!-- ✅ Кнопка Edit -->
                <a th:href="@{/admin/edit/{id}(id=${user.id})}">
                    <button>Редактировать</button>
                </a>

                <!-- ✅ Кнопка Delete -->
                <a th:href="@{/admin/delete/} + ${user.id}">
                    <button style="background-color: red; color: white;">Удалить</button>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<!-- ✅ Кнопка выхода -->
<form th:action="@{/logout}" method="post">
    <button type="submit">Выйти</button>
</form>

</body>
</html>
